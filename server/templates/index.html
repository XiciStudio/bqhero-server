<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爆枪英雄私服 - 登录</title>
<style>
:root {
  --bg-deep:   #080b14;
  --bg-card:   #111827;
  --bg-input:  #0f1420;
  --border:    rgba(255,255,255,0.08);
  --accent:    #e94560;
  --accent-hover: #d63851;
  --gold:      #f0c040;
  --text:      #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --font-ui:   "Microsoft YaHei", "PingFang SC", -apple-system, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box }
body {
  font-family: var(--font-ui);
  background: var(--bg-deep);
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* Ambient glow */
.bg-glow {
  position: fixed; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(233,69,96,0.08) 0%, transparent 55%),
    radial-gradient(ellipse at 70% 80%, rgba(240,192,64,0.05) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(59,130,246,0.04) 0%, transparent 60%);
}

.container {
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 44px 40px 36px;
  width: 400px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  text-align: center;
}
.logo {
  width: 64px; height: 64px;
  margin: 0 auto 16px;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(233,69,96,0.25), rgba(240,192,64,0.15));
  display: flex;
  align-items: center;
  justify-content: center;
}
h1 { font-size: 26px; color: var(--text); margin-bottom: 4px; letter-spacing: 3px }
.sub {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 24px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 0;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.tab {
  flex: 1;
  padding: 10px 0;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-muted);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-ui);
  letter-spacing: 1px;
}
.tab:hover { color: var(--text-secondary) }
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* Forms */
.form-panel { display: none }
.form-panel.active { display: block }

.form-group { margin-bottom: 16px; text-align: left }
.form-group label {
  display: block;
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.form-group input {
  width: 100%;
  padding: 11px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 15px;
  font-family: var(--font-ui);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-group input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(233,69,96,0.18);
}
.form-group input::placeholder { color: var(--text-muted) }

.btn-play {
  width: 100%;
  padding: 13px;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 16px;
  font-family: var(--font-ui);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 3px;
  margin-top: 6px;
}
.btn-play:hover {
  background: var(--accent-hover);
  box-shadow: 0 8px 28px rgba(233,69,96,0.35);
  transform: translateY(-1px);
}

.tips {
  margin-top: 20px;
  padding: 12px 16px;
  background: rgba(240,192,64,0.05);
  border: 1px solid rgba(240,192,64,0.12);
  border-radius: 8px;
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.8;
}
.tips strong { color: var(--gold); font-weight: 600 }

/* Flash Messages */
.flash {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.4;
  margin-bottom: 16px;
  text-align: left;
}
.flash.success {
  background: rgba(34,197,94,0.08);
  border: 1px solid rgba(34,197,94,0.25);
  color: #86efac;
}
.flash.error {
  background: rgba(233,69,96,0.08);
  border: 1px solid rgba(233,69,96,0.25);
  color: #fca5a5;
}
.flash svg { flex-shrink: 0 }

.field-hint {
  font-size: 12px;
  color: #fca5a5;
  margin-top: -8px;
  margin-bottom: 12px;
  text-align: left;
}
.btn-play:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none !important;
  box-shadow: none !important;
}

@media (max-width: 480px) {
  body { align-items: flex-start; padding-top: 40px }
  .container { width: calc(100% - 32px); padding: 32px 24px 28px }
  h1 { font-size: 22px }
}
</style>
</head>
<body>
<div class="bg-glow"></div>

<div class="container">
  <div class="logo">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
  </div>
  <h1>爆枪英雄</h1>
  <p class="sub">Private Server</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">
        {% if category == "success" %}
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        {% else %}
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        {% endif %}
        {{ message }}
      </div>
    {% endfor %}
  {% endwith %}

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">登录</button>
    <button class="tab" onclick="switchTab('register')">注册</button>
  </div>

  <!-- Login Form -->
  <form id="loginPanel" class="form-panel active" method="POST" action="/api/login" onsubmit="return handleLogin(this)">
    <input type="hidden" name="_csrf" value="{{ csrf }}">
    <div class="form-group">
      <label for="login-username">账号</label>
      <input type="text" id="login-username" name="username" placeholder="请输入账号" required autofocus>
    </div>
    <div class="form-group">
      <label for="login-password">密码</label>
      <input type="password" id="login-password" name="password" placeholder="请输入密码" required>
    </div>
    <button type="submit" class="btn-play" id="loginBtn">进入游戏</button>
  </form>

  <!-- Register Form -->
  <form id="registerPanel" class="form-panel" method="POST" action="/register" onsubmit="return handleRegister(this)">
    <input type="hidden" name="_csrf" value="{{ csrf }}">
    <div class="form-group">
      <label for="reg-username">账号</label>
      <input type="text" id="reg-username" name="username" placeholder="3-16位字母或数字" required>
    </div>
    <div class="form-group">
      <label for="reg-password">密码</label>
      <input type="password" id="reg-password" name="password" placeholder="至少4位" required>
    </div>
    <div class="form-group">
      <label for="reg-confirm">确认密码</label>
      <input type="password" id="reg-confirm" name="confirm_password" placeholder="请再次输入密码" required>
    </div>
    <div class="field-hint" id="regHint" style="display:none"></div>
    <button type="submit" class="btn-play" id="regBtn">注册并进入</button>
  </form>

  <div class="tips" id="loginTips">
    已有账号请输入密码登录，首次登录赠送 <strong>5000 金币</strong>。
  </div>
  <div class="tips" id="registerTips" style="display:none">
    注册即赠送 <strong>5000 金币</strong>，账号请使用字母或数字。
  </div>
</div>

<script>
function switchTab(tab) {
  var tabs = document.querySelectorAll('.tab');
  var panels = document.querySelectorAll('.form-panel');
  var loginTips = document.getElementById('loginTips');
  var registerTips = document.getElementById('registerTips');

  tabs.forEach(function(t) { t.classList.remove('active') });
  panels.forEach(function(p) { p.classList.remove('active') });

  if (tab === 'login') {
    tabs[0].classList.add('active');
    document.getElementById('loginPanel').classList.add('active');
    loginTips.style.display = '';
    registerTips.style.display = 'none';
  } else {
    tabs[1].classList.add('active');
    document.getElementById('registerPanel').classList.add('active');
    loginTips.style.display = 'none';
    registerTips.style.display = '';
  }
}

function setLoading(btn, loading) {
  if (loading) {
    btn.disabled = true;
    btn._text = btn.textContent;
    btn.textContent = '请稍候...';
  } else {
    btn.disabled = false;
    btn.textContent = btn._text || btn.textContent;
  }
}

function handleLogin(form) {
  var btn = document.getElementById('loginBtn');
  setLoading(btn, true);
  return true;
}

function handleRegister(form) {
  var hint = document.getElementById('regHint');
  var username = form.username.value;
  var pw = form.password.value;
  var confirm = form.confirm_password.value;

  hint.style.display = 'none';

  if (!/^[a-zA-Z0-9]{3,16}$/.test(username)) {
    hint.textContent = '账号需要 3-16 位字母或数字';
    hint.style.display = 'block';
    return false;
  }
  if (pw.length < 4) {
    hint.textContent = '密码长度不能少于 4 位';
    hint.style.display = 'block';
    return false;
  }
  if (pw !== confirm) {
    hint.textContent = '两次输入的密码不一致';
    hint.style.display = 'block';
    return false;
  }

  var btn = document.getElementById('regBtn');
  setLoading(btn, true);
  return true;
}

// Real-time confirm password validation
document.getElementById('reg-confirm').addEventListener('input', function() {
  var pw = document.getElementById('reg-password').value;
  var hint = document.getElementById('regHint');
  if (this.value && this.value !== pw) {
    hint.textContent = '密码不一致';
    hint.style.display = 'block';
  } else {
    hint.style.display = 'none';
  }
});

// Preserve tab on page load if there was a register error
(function() {
  var hash = window.location.hash;
  if (hash === '#register') switchTab('register');
})();
</script>
</body>
</html>
