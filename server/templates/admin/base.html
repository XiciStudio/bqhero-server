<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}管理后台{% endblock %} — 爆枪英雄私服</title>
<style>
* { margin:0; padding:0; box-sizing:border-box }

body {
  font-family: "Microsoft YaHei", sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  min-height: 100vh;
}

/* ---- Sidebar ---- */
.sidebar {
  width: 220px;
  background: #16213e;
  padding: 24px 0;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  border-right: 1px solid #333;
}
.sidebar h2 {
  color: #e94560;
  font-size: 18px;
  text-align: center;
  margin-bottom: 32px;
  letter-spacing: 2px;
}
.sidebar a {
  display: block;
  padding: 12px 24px;
  color: #aaa;
  text-decoration: none;
  font-size: 14px;
  transition: all 0.2s;
  border-left: 3px solid transparent;
}
.sidebar a:hover, .sidebar a.active {
  color: #fff;
  background: rgba(233, 69, 96, 0.1);
  border-left-color: #e94560;
}
.sidebar a.active {
  color: #fff;
  font-weight: bold;
}
.sidebar .spacer { flex: 1 }
.sidebar .back-link a { color: #888; font-size: 13px }
.sidebar .back-link a:hover { color: #e94560 }

/* ---- Main ---- */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ---- Top Bar ---- */
.topbar {
  background: #16213e;
  padding: 14px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #333;
}
.topbar h3 { font-size: 16px; color: #fff }
.topbar .logout {
  color: #e94560;
  text-decoration: none;
  font-size: 13px;
  padding: 6px 16px;
  border: 1px solid #e94560;
  border-radius: 4px;
  transition: all 0.2s;
}
.topbar .logout:hover { background: #e94560; color: #fff }

/* ---- Content ---- */
.content { padding: 28px; flex: 1 }

/* ---- Flash Messages ---- */
.flash { padding: 12px 20px; border-radius: 6px; margin-bottom: 16px; font-size: 14px }
.flash.success { background: rgba(76,175,80,0.2); border: 1px solid #4CAF50; color: #81C784 }
.flash.error   { background: rgba(233,69,96,0.2); border: 1px solid #e94560; color: #EF9A9A }

/* ---- Cards ---- */
.card {
  background: #16213e;
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.card h4 { color: #e94560; margin-bottom: 16px; font-size: 16px }

/* ---- Code Result Card ---- */
.code-result {
  background: rgba(255,215,0,0.08);
  border: 1px solid #ffd700;
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 20px;
  text-align: center;
}
.code-result-label {
  color: #aaa;
  font-size: 13px;
  margin-bottom: 8px;
}
.code-result-value {
  font-family: "Consolas", monospace;
  font-size: 20px;
  color: #ffd700;
  padding: 12px 16px;
  background: rgba(0,0,0,0.3);
  border: 1px solid #ffd700;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  word-break: break-all;
  user-select: all;
}
.code-result-value:hover {
  background: rgba(255,215,0,0.1);
}

/* ---- Stats Grid ---- */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px }
.stat-card {
  background: #16213e;
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  transition: transform 0.2s, box-shadow 0.2s;
  cursor: default;
}
.stat-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
}
.stat-card .num { font-size: 42px; color: #ffd700; font-weight: bold; margin-bottom: 8px }
.stat-card .label { font-size: 14px; color: #888 }

/* ---- Tables ---- */
.table-wrap { overflow-x: auto }
table { width: 100%; border-collapse: collapse; font-size: 13px }
thead th {
  background: #0f3460;
  color: #aaa;
  padding: 10px 14px;
  text-align: left;
  font-weight: normal;
  white-space: nowrap;
}
tbody td { padding: 10px 14px; border-bottom: 1px solid #2a2a4a }
tbody tr { transition: background 0.15s }
tbody tr:hover { background: rgba(233,69,96,0.05) }
.mono { font-family: "Consolas", monospace; color: #ffd700 }

/* ---- Forms ---- */
input, select, textarea {
  background: #0f3460;
  border: 1px solid #333;
  border-radius: 6px;
  padding: 10px 14px;
  color: #eee;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
input:focus, select:focus { border-color: #e94560 }
.form-row { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; flex-wrap: wrap }
.form-row label { color: #aaa; font-size: 13px; min-width: 60px }
.form-inline { display: flex; gap: 8px; align-items: center }

/* ---- Buttons ---- */
.btn {
  padding: 8px 20px; border: none; border-radius: 6px;
  cursor: pointer; font-size: 13px; transition: all 0.2s;
  text-decoration: none; display: inline-block;
}
.btn-primary { background: #e94560; color: #fff }
.btn-primary:hover { background: #d63852 }
.btn-secondary { background: #555; color: #fff }
.btn-secondary:hover { background: #666 }
.btn-danger { background: #c0392b; color: #fff; padding: 6px 14px; font-size: 12px }
.btn-danger:hover { background: #e74c3c }
.btn-sm { padding: 4px 12px; font-size: 11px }
.btn-outline { background: transparent; border: 1px solid #e94560; color: #e94560 }
.btn-outline:hover { background: #e94560; color: #fff }

/* ---- Pagination ---- */
.pagination { display: flex; gap: 8px; align-items: center; margin-top: 16px; font-size: 13px }
.pagination a { color: #e94560; text-decoration: none; padding: 6px 12px; border: 1px solid #444; border-radius: 4px }
.pagination a:hover { background: rgba(233,69,96,0.1) }
.pagination span { color: #888 }

/* ---- Misc ---- */
.search-bar { max-width: 400px; margin-bottom: 20px }
.empty { text-align: center; color: #666; padding: 40px }
.badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold }
.badge-yes { background: rgba(76,175,80,0.2); color: #81C784 }
.badge-no  { background: rgba(158,158,158,0.2); color: #BDBDBD }
.badge-gold { background: rgba(255,215,0,0.15); color: #ffd700 }
.badge-red { background: rgba(233,69,96,0.2); color: #EF9A9A }

.edit-form { display: none; margin-top: 8px; padding: 12px; background: rgba(15,52,96,0.5); border-radius: 8px }

@media (max-width: 768px) {
  .stat-grid { grid-template-columns: repeat(2, 1fr) }
  .sidebar { width: 60px }
  .sidebar h2 { font-size: 14px; letter-spacing: 0 }
  .sidebar a { padding: 10px 8px; font-size: 11px; text-align: center }
}
</style>
{% block head %}{% endblock %}
</head>
<body>

<div class="sidebar">
  <h2>管理后台</h2>
  <a href="{{ url_for('admin.dashboard') }}" class="{{ 'active' if request.path == '/admin' }}">仪表盘</a>
  <a href="{{ url_for('admin.users') }}" class="{{ 'active' if request.path.startswith('/admin/users') }}">用户管理</a>
  <a href="{{ url_for('admin.codes') }}" class="{{ 'active' if request.path.startswith('/admin/codes') }}">兑换码</a>
  <a href="{{ url_for('admin.unions') }}" class="{{ 'active' if request.path.startswith('/admin/unions') }}">工会管理</a>
  <div class="spacer"></div>
  <div class="back-link"><a href="/">&#8592; 返回游戏</a></div>
</div>

<div class="main">
  <div class="topbar">
    <h3>{% block header %}管理后台{% endblock %}</h3>
    <a href="{{ url_for('admin.logout') }}" class="logout">退出登录</a>
  </div>
  <div class="content">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</div>

<script>
function toggleEdit(name) {
  var el = document.getElementById("edit-" + name);
  el.style.display = el.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
