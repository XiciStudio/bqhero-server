<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员登录 — 爆枪英雄私服</title>
<style>
:root {
  --bg-deep:   #080b14;
  --bg-card:   #111827;
  --bg-input:  #0f1420;
  --border:    rgba(255,255,255,0.08);
  --accent:    #e94560;
  --accent-hover: #d63851;
  --text:      #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --font-ui:   "Microsoft YaHei", "PingFang SC", -apple-system, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box }
body {
  font-family: var(--font-ui);
  background: var(--bg-deep);
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.bg-grid {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(233,69,96,0.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(240,192,64,0.04) 0%, transparent 50%),
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
}
.card {
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 48px 40px;
  width: 380px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  text-align: center;
}
.icon-wrap {
  width: 56px; height: 56px;
  margin: 0 auto 20px;
  border-radius: 14px;
  background: rgba(233,69,96,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
}
h1 { font-size: 20px; color: var(--text); margin-bottom: 4px; letter-spacing: 2px }
.sub { font-size: 13px; color: var(--text-muted); margin-bottom: 32px }

input {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  color: var(--text);
  font-size: 15px;
  font-family: var(--font-ui);
  text-align: center;
  letter-spacing: 4px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  margin-bottom: 20px;
}
input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(233,69,96,0.2);
}
input::placeholder { color: var(--text-muted); letter-spacing: 1px }
.btn {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 15px;
  font-family: var(--font-ui);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 2px;
}
.btn:hover { background: var(--accent-hover); box-shadow: 0 6px 24px rgba(233,69,96,0.3) }

.error {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(233,69,96,0.08);
  border: 1px solid rgba(233,69,96,0.25);
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 16px;
  font-size: 13px;
  color: #fca5a5;
  text-align: left;
}
.back { margin-top: 24px }
.back a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 13px;
  transition: color 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.back a:hover { color: var(--text) }
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="card">
  <div class="icon-wrap">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  </div>
  <h1>管理后台</h1>
  <p class="sub">爆枪英雄私服</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="error">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        {{ message }}
      </div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <input type="password" name="adminkey" placeholder="管理员密钥" autofocus>
    <button type="submit" class="btn">登录</button>
  </form>

  <div class="back">
    <a href="/">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      返回游戏
    </a>
  </div>
</div>
</body>
</html>
