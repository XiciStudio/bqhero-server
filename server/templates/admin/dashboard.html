{% extends "admin/base.html" %}
{% block title %}仪表盘{% endblock %}
{% block header %}仪表盘{% endblock %}

{% block content %}
<div class="stat-grid">
  <div class="stat-card">
    <div class="num">{{ stats.users }}</div>
    <div class="label">总用户数</div>
  </div>
  <div class="stat-card">
    <div class="num">{{ stats.codes }}</div>
    <div class="label">兑换码数量</div>
  </div>
  <div class="stat-card">
    <div class="num">{{ stats.unions }}</div>
    <div class="label">工会数量</div>
  </div>
  <div class="stat-card">
    <div class="num">{{ stats.ranks }}</div>
    <div class="label">排行榜数量</div>
  </div>
</div>

<div class="card" style="margin-top:24px">
  <h4>快捷操作</h4>
  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:12px">
    <a href="{{ url_for('admin.users') }}" class="btn btn-primary">用户管理</a>
    <a href="{{ url_for('admin.codes') }}" class="btn btn-outline">兑换码管理</a>
    <a href="{{ url_for('admin.unions') }}" class="btn btn-outline">查看工会</a>
  </div>
</div>
{% endblock %}
