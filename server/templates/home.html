<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爆枪英雄私服 - 主页</title>
<style>
:root {
  --bg-deep:   #080b14;
  --bg-card:   #111827;
  --bg-input:  #0f1420;
  --border:    rgba(255,255,255,0.08);
  --accent:    #e94560;
  --accent-hover: #d63851;
  --gold:      #f0c040;
  --success:   #22c55e;
  --text:      #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --font-ui:   "Microsoft YaHei", "PingFang SC", -apple-system, sans-serif;
  --font-mono: "Fira Code", "Consolas", "SF Mono", monospace;
}
* { margin:0; padding:0; box-sizing:border-box }
body {
  font-family: var(--font-ui);
  background: var(--bg-deep);
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.bg-glow {
  position: fixed; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(233,69,96,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(240,192,64,0.04) 0%, transparent 50%);
}
.container {
  position: relative;
  width: 420px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Gold Balance Card */
.balance-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 32px;
  text-align: center;
  box-shadow: 0 16px 48px rgba(0,0,0,0.4);
}
.balance-icon {
  width: 48px; height: 48px;
  margin: 0 auto 12px;
  border-radius: 12px;
  background: rgba(240,192,64,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--gold);
}
.balance-label {
  font-size: 13px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.balance-value {
  font-family: var(--font-mono);
  font-size: 40px;
  font-weight: 700;
  color: var(--gold);
  text-shadow: 0 0 30px rgba(240,192,64,0.25);
}

/* Flash Messages */
.flash {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.4;
}
.flash.success {
  background: rgba(34,197,94,0.08);
  border: 1px solid rgba(34,197,94,0.25);
  color: #86efac;
}
.flash.error {
  background: rgba(233,69,96,0.08);
  border: 1px solid rgba(233,69,96,0.25);
  color: #fca5a5;
}
.flash svg { flex-shrink: 0 }

/* Recharge Card */
.recharge-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 24px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.recharge-card h3 {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 12px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
}
.recharge-row {
  display: flex;
  gap: 8px;
}
.recharge-row input {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 14px;
  font-family: var(--font-ui);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.recharge-row input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(233,69,96,0.18);
}
.recharge-row input::placeholder { color: var(--text-muted) }
.btn-redeem {
  background: var(--accent);
  border: none;
  border-radius: 8px;
  padding: 10px 20px;
  color: #fff;
  font-size: 14px;
  font-family: var(--font-ui);
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  letter-spacing: 1px;
}
.btn-redeem:hover { background: var(--accent-hover); box-shadow: 0 4px 16px rgba(233,69,96,0.3) }

/* Action Buttons */
.actions {
  display: flex;
  gap: 10px;
}
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 13px 24px;
  border-radius: 10px;
  font-size: 15px;
  font-family: var(--font-ui);
  font-weight: 500;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-play {
  flex: 1;
  background: var(--accent);
  color: #fff;
  letter-spacing: 2px;
}
.btn-play:hover { background: var(--accent-hover); box-shadow: 0 6px 20px rgba(233,69,96,0.35); transform: translateY(-1px) }
.btn-logout {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 13px;
  padding: 13px 18px;
}
.btn-logout:hover { border-color: var(--border); color: var(--text) }

/* Admin link */
.admin-link {
  text-align: center;
  margin-top: 4px;
}
.admin-link a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 12px;
  transition: color 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.admin-link a:hover { color: var(--text) }
</style>
</head>
<body>
<div class="bg-glow"></div>

<div class="container">
  <!-- Gold Balance -->
  <div class="balance-card">
    <div class="balance-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="6" x2="12" y2="12"/><line x1="12" y1="18" x2="12.01" y2="18"/><path d="M9 9h3.5a2 2 0 0 1 0 4H9"/></svg>
    </div>
    <div class="balance-label">当前金币</div>
    <div class="balance-value">{{ Money }}</div>
  </div>

  <!-- Flash Messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">
        {% if category == "success" %}
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        {% else %}
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        {% endif %}
        {{ message }}
      </div>
    {% endfor %}
  {% endwith %}

  <!-- Recharge -->
  <div class="recharge-card">
    <h3>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      兑换码充值
    </h3>
    <form method="POST" action="/redeem" class="recharge-row">
      <input type="text" name="code" placeholder="请输入兑换码" required>
      <button type="submit" class="btn-redeem">兑换</button>
    </form>
  </div>

  <!-- Actions -->
  <div class="actions">
    <a href="/BQTJ" class="btn btn-play">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      进入游戏
    </a>
    <a href="/Exit" class="btn btn-logout">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      退出
    </a>
  </div>

  <div class="admin-link">
    <a href="/admin">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      管理后台
    </a>
  </div>
</div>
</body>
</html>
